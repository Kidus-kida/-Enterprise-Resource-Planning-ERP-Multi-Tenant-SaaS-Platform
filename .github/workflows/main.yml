name: Deploy Laravel App via FTP

on:
  push:
    branches:
      - main  # or your deploy branch

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, bcmath, intl, pdo, mysql
        tools: composer

    - name: Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader

    - name: Generate optimized autoload files
      run: composer dump-autoload -o

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Clean node_modules and package-lock
      run: |
        rm -rf node_modules package-lock.json

    - name: Install NPM dependencies
      run: npm install

    - name: Build assets
      run: npm run build

    - name: Upload files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        server-dir: /
        local-dir: ./  # Upload everything from repo root
        exclude: |
          **/.git*
          **/node_modules/**
          **/tests/**
          **/.github/**
          **/storage/**
          .env
          .env.*
